name: ICanSee
options:
  bundleIdPrefix: com.jtrant
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
  # Region-specific spellings (colour vs. color) live in
  # ICanSee/Localizable.xcstrings and InfoPlist.xcstrings.
  knownRegions:
    - en
    - en-GB
    - en-AU
    - en-CA
    - Base
packages:
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: 2.0.0
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "5L4KT67Y36"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ICanSee:
    type: application
    platform: iOS
    sources:
      - path: ICanSee
        excludes:
          - "Preview Content/**"
      - path: ICanSee/Preview Content
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jtrant.i-can-see
        INFOPLIST_FILE: ICanSee/Info.plist
        DEVELOPMENT_ASSET_PATHS: '"ICanSee/Preview Content"'
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: TelemetryDeck
        product: TelemetryDeck
  ICanSeeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ICanSeeTests
    dependencies:
      - target: ICanSee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jtrant.i-can-see-tests
        GENERATE_INFOPLIST_FILE: "YES"
